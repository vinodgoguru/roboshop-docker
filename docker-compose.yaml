name: roboshop
services:
  mongodb:
    build: ./mongodb
    image: vinod900/mongodb:v1 # docker build -t vinod900/mongodb:v1
    container_name: mongodb # docker run -d --network roboshop vinod900/mongodb:v1
  catalogue:
    build: ./catalogue
    image: vinod900/catalogue.v1
    container_name: catalogue
    depends_on:
    - mongodb
  frontend:
    build: ./frontend
    image: vinod900/frontend:v1
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
    - payment
  user:
    build: ./user
    image: vinod900/user:v1
    container_name: user
    environment:
      MONGO: true
      REDIS_URL: 'redis://redis:6379'
      MONGO_URL: "mongodb://mongodb:27017/users"
    depends_on:
    - redis
    - mongodb
  cart:
    build: ./cart
    image: vinod900/cart:v1
    container_name: cart
    enviornment:
    REDIS_HOST: redis
    CATALOGUE_HOST: catalogue
    CATALOGUE_PORT: 8080
    depends_on:
    - redis
    - catalogue
  shipping:
    build: ./shipping
    image: vinod900/shipping:v1
    container_name: shipping
    environment:
      CART_ENDPOINT: "cart:8080"
      DB_HOST: mysql
    depends_on:
    - mysql
    - cart
  payment:
    build: ./payment
    image: vinod900/payment:v1
    container_name: payment
    environment:
      CART_HOST: "cart"
      CART_HOST: 8080
      USER_HOST: user
      USER_PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_USER: roboshop
      AMQP_PASS: roboshop123
    depends_on
    - cart
    - user
    - rabbitmq
  redis:
    image: redis:7
    container_name: redis 
  mysql:
    image: vinod900/mysql:v1
    build: ./mysql
    container_name: mysql
    command: --mysql-native-password=ON --innob-lock_wait_timeout=120
    environment:
      MYSQL_ROOT_PASSWORD: "RoboShop@1"
  rabbitmq:
    image: rabbitmq: 3
    container_name: rabbitmq  
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123  
networks:
  default: # this means all the services in this file use this network
    name: roboshop
    driver: bridge
    external: false # if true it should be created manually, if false docker creates this network
    
